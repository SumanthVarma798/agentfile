apiVersion: agentfile/v1
kind: Agent
metadata:
  name: batch-pipeline-agent
  version: 0.2.0
  description: Operates a batch data pipeline and answers questions about its state.
  authors: [Sumanth Varma]
  license: MIT
  tags: [data-pipeline, operations, observability]
spec:
  model:
    provider: anthropic
    name: claude-sonnet-4-5
    params:
      temperature: 0.2
      max_tokens: 8192
  system_prompt:
    file: ./prompts/system.md
  tools:
    - mcp: https://pipeline-metrics.example.com/mcp
      auth:
        type: bearer
        env: PIPELINE_METRICS_TOKEN
    - mcp: https://event-streams.example.com/mcp
      auth:
        type: bearer
        env: EVENT_STREAMS_TOKEN
    - mcp: builtin/filesystem
  memory:
    type: chroma
    config:
      collection: batch-pipeline-runs
      embedding_model: all-MiniLM-L6-v2
  permissions:
    network:
      mode: allowlist
      hosts:
        - api.anthropic.com
        - pipeline-metrics.example.com
        - event-streams.example.com
    filesystem:
      mode: read-only
      paths: [./prompts, ./schemas]
  env:
    required:
      - ANTHROPIC_API_KEY
      - PIPELINE_METRICS_TOKEN
      - EVENT_STREAMS_TOKEN
    optional:
      - LOG_LEVEL
